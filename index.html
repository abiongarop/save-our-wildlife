<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>

        <div class="video-container" id="videoWrapper">
            <video id="wildlifeVideo" controls aria-label="Wildlife conservation promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <button id="videoBtn" aria-live="polite">Play Video</button>

        <p class="description">
Amazing creatures are losing their homes every single day. Let's team up to protect endangered species and preserve our wild spaces before time runs out.        </p>
    </main>

    <script src="script.js"></script>
</body>
</html>
